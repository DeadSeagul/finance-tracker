  <div id="root"></div>
  <script>
const {
  useState,
  useRef,
  useEffect
} = React;
const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
const today = new Date();
function formatCurrency(n) {
  return new Intl.NumberFormat("en-US", {
    style: "currency",
    currency: "USD"
  }).format(n || 0);
}
function getKey(profile, year, month) {
  return `ft:${profile}:${year}-${month}`;
}
function getProfilePrefix(profile) {
  return `ft:${profile}:`;
}

// ── Storage helpers (localStorage — works everywhere) ────────────────────────
async function storeMonth(key, data) {
  try {
    localStorage.setItem(key, JSON.stringify(data));
  } catch {}
}
async function loadMonth(key) {
  try {
    const r = localStorage.getItem(key);
    return r ? JSON.parse(r) : null;
  } catch {
    return null;
  }
}
async function listMonthKeys(prefix) {
  try {
    return Object.keys(localStorage).filter(k => k.startsWith(prefix));
  } catch {
    return [];
  }
}
async function storeProfileNames(names) {
  try {
    localStorage.setItem("ft:profiles", JSON.stringify(names));
  } catch {}
}
async function loadProfileNames() {
  try {

// ── CSV Parser ────────────────────────────────────────────────────────────────
function splitCSVLine(line) {
  const result = [];
  let cur = "",
    inQ = false;
  for (const c of line) {
    if (c === '"') inQ = !inQ;else if (c === ',' && !inQ) {
      result.push(cur);
      cur = "";
    } else cur += c;
  }
  result.push(cur);
  return result;
}
function parseDate(str) {
  if (!str) return null;
  const s = str.trim().replace(/['"]/g, "");
  let d = new Date(s);
  if (!isNaN(d.getTime())) return d;
  const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m) {
    const y = m[3].length === 2 ? 2000 + parseInt(m[3]) : parseInt(m[3]);
    d = new Date(y, parseInt(m[1]) - 1, parseInt(m[2]));
    if (!isNaN(d.getTime())) return d;
  }
  return null;
}
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  let hi = 0;
  for (let i = 0; i < Math.min(5, lines.length); i++) if (/date|description|amount|debit|credit|memo/i.test(lines[i])) {
    hi = i;
    break;
  }
  const headers = splitCSVLine(lines[hi]).map(h => h.toLowerCase().trim().replace(/['"]/g, ""));
  const rows = [];
  for (let i = hi + 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = splitCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, j) => {
      obj[h] = (cols[j] || "").trim().replace(/^"|"$/g, "");
    });
    rows.push(obj);
  }
  const dc = headers.find(h => /^(date|transaction.?date|posted.?date)$/i.test(h)) || headers.find(h => /date/i.test(h));
  const ec = headers.find(h => /^(description|memo|name|payee|narrative)$/i.test(h)) || headers.find(h => /desc|memo|name/i.test(h));
  const ac = headers.find(h => /^(amount|transaction.?amount)$/i.test(h));
  const dbc = headers.find(h => /^(debit|withdrawal|dr)$/i.test(h));
  const crc = headers.find(h => /^(credit|deposit|cr)$/i.test(h));
  return rows.map(row => {
    const date = dc ? parseDate(row[dc]) : null;
    const desc = (ec ? row[ec] : Object.values(row).find(v => v && isNaN(parseFloat(v.replace(/[$,]/g, "")))) || "Unknown").trim();
    let amount = 0;
    if (ac) amount = parseFloat(row[ac].replace(/[$, ]/g, "")) || 0;else if (dbc || crc) {
      const d = parseFloat((row[dbc] || "0").replace(/[$, ]/g, "")) || 0;
      const c = parseFloat((row[crc] || "0").replace(/[$, ]/g, "")) || 0;
      amount = c - d;
    }
    return {
      date,
      desc,
      amount
    };
  }).filter(r => r.desc);
}
function detectMonth(rows) {
  const counts = {};
  rows.forEach(r => {
    if (r.date) {
      const k = `${r.date.getFullYear()}-${r.date.getMonth()}`;
      counts[k] = (counts[k] || 0) + 1;
    }
  });
  const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0]?.[0];
  if (!top) return null;
  const [y, m] = top.split("-").map(Number);
  return {
    month: m,
    year: y
  };
}
function autoTag(rows) {
  const t = {};
  rows.forEach((r, i) => {
    t[i] = r.amount > 0 ? "income" : r.amount < 0 ? "bill" : "ignore";
  });
  return t;
}
