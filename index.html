<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Tracker</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>body{margin:0;background:#0d0d10;}*{box-sizing:border-box;}</style>
</head>
<body>
  <div id="root"></div>
  <script>
const {
  useState,
  useRef,
  useEffect
} = React;
const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
const today = new Date();
function formatCurrency(n) {
  return new Intl.NumberFormat("en-US", {
    style: "currency",
    currency: "USD"
  }).format(n || 0);
}
function getKey(profile, year, month) {
  return `ft:${profile}:${year}-${month}`;
}
function getProfilePrefix(profile) {
  return `ft:${profile}:`;
}

// ── Storage helpers (localStorage — works everywhere) ────────────────────────
async function storeMonth(key, data) {
  try {
    localStorage.setItem(key, JSON.stringify(data));
  } catch {}
}
async function loadMonth(key) {
  try {
    const r = localStorage.getItem(key);
    return r ? JSON.parse(r) : null;
  } catch {
    return null;
  }
}
async function listMonthKeys(prefix) {
  try {
    return Object.keys(localStorage).filter(k => k.startsWith(prefix));
  } catch {
    return [];
  }
}
async function storeProfileNames(names) {
  try {
    localStorage.setItem("ft:profiles", JSON.stringify(names));
  } catch {}
}
async function loadProfileNames() {
  try {
    const r = localStorage.getItem("ft:profiles");
    return r ? JSON.parse(r) : ["Person 1", "Person 2"];
  } catch {
    return ["Person 1", "Person 2"];
  }
}

// ── Yearly savings (not per-month) ────────────────────────────────────────
function getSavingsKey(profile, year) {
  return `ft:${profile}:savings:${year}`;
}
async function storeSavings(profile, year, data) {
  try {
    localStorage.setItem(getSavingsKey(profile, year), JSON.stringify(data));
  } catch {}
}
async function loadSavings(profile, year) {
  try {
    const r = localStorage.getItem(getSavingsKey(profile, year));
    return r ? JSON.parse(r) : [];
  } catch {
    return [];
  }
}

// ── CSV Parser ────────────────────────────────────────────────────────────────
function splitCSVLine(line) {
  const result = [];
  let cur = "",
    inQ = false;
  for (const c of line) {
    if (c === '"') inQ = !inQ;else if (c === ',' && !inQ) {
      result.push(cur);
      cur = "";
    } else cur += c;
  }
  result.push(cur);
  return result;
}
function parseDate(str) {
  if (!str) return null;
  const s = str.trim().replace(/['"]/g, "");
  let d = new Date(s);
  if (!isNaN(d.getTime())) return d;
  const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m) {
    const y = m[3].length === 2 ? 2000 + parseInt(m[3]) : parseInt(m[3]);
    d = new Date(y, parseInt(m[1]) - 1, parseInt(m[2]));
    if (!isNaN(d.getTime())) return d;
  }
  return null;
}
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  let hi = 0;
  for (let i = 0; i < Math.min(5, lines.length); i++) if (/date|description|amount|debit|credit|memo/i.test(lines[i])) {
    hi = i;
    break;
  }
  const headers = splitCSVLine(lines[hi]).map(h => h.toLowerCase().trim().replace(/['"]/g, ""));
  const rows = [];
  for (let i = hi + 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = splitCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, j) => {
      obj[h] = (cols[j] || "").trim().replace(/^"|"$/g, "");
    });
    rows.push(obj);
  }
  const dc = headers.find(h => /^(date|transaction.?date|posted.?date)$/i.test(h)) || headers.find(h => /date/i.test(h));
  const ec = headers.find(h => /^(description|memo|name|payee|narrative)$/i.test(h)) || headers.find(h => /desc|memo|name/i.test(h));
  const ac = headers.find(h => /^(amount|transaction.?amount)$/i.test(h));
  const dbc = headers.find(h => /^(debit|withdrawal|dr)$/i.test(h));
  const crc = headers.find(h => /^(credit|deposit|cr)$/i.test(h));
  return rows.map(row => {
    const date = dc ? parseDate(row[dc]) : null;
    const desc = (ec ? row[ec] : Object.values(row).find(v => v && isNaN(parseFloat(v.replace(/[$,]/g, "")))) || "Unknown").trim();
    let amount = 0;
    if (ac) amount = parseFloat(row[ac].replace(/[$, ]/g, "")) || 0;else if (dbc || crc) {
      const d = parseFloat((row[dbc] || "0").replace(/[$, ]/g, "")) || 0;
      const c = parseFloat((row[crc] || "0").replace(/[$, ]/g, "")) || 0;
      amount = c - d;
    }
    return {
      date,
      desc,
      amount
    };
  }).filter(r => r.desc);
}
function detectMonth(rows) {
  const counts = {};
  rows.forEach(r => {
    if (r.date) {
      const k = `${r.date.getFullYear()}-${r.date.getMonth()}`;
      counts[k] = (counts[k] || 0) + 1;
    }
  });
  const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0]?.[0];
  if (!top) return null;
  const [y, m] = top.split("-").map(Number);
  return {
    month: m,
    year: y
  };
}
function autoTag(rows) {
  const t = {};
  rows.forEach((r, i) => {
    t[i] = r.amount > 0 ? "income" : r.amount < 0 ? "bill" : "ignore";
  });
  return t;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [ready, setReady] = useState(false);
  const [profile, setProfile] = useState(0); // 0 or 1
  const [profileNames, setProfileNames] = useState(["Person 1", "Person 2"]);
  const [editingName, setEditingName] = useState(null); // null | 0 | 1
  const [nameInput, setNameInput] = useState("");
  const [allData, setAllData] = useState({});
  const [month, setMonth] = useState(today.getMonth());
  const [year, setYear] = useState(today.getFullYear());
  const [activeTab, setActiveTab] = useState("overview");
  const [showIncomeModal, setShowIncomeModal] = useState(false);
  const [incomeForm, setIncomeForm] = useState({
    label: "",
    amount: ""
  });
  const [editIncomeIdx, setEditIncomeIdx] = useState(null);
  const [showBillModal, setShowBillModal] = useState(false);
  const [billForm, setBillForm] = useState({
    label: "",
    amount: "",
    due: "",
    paid: false
  });
  const [editBillIdx, setEditBillIdx] = useState(null);
  const [showSavingsModal, setShowSavingsModal] = useState(false);
  const [savingsForm, setSavingsForm] = useState({
    label: "",
    target: "",
    current: "",
    notes: ""
  });
  const [editSavingsIdx, setEditSavingsIdx] = useState(null);
  const [yearSavings, setYearSavings] = useState([]);
  const [showCopyModal, setShowCopyModal] = useState(false);
  const [copyTargets, setCopyTargets] = useState([]);
  const [copyWhat, setCopyWhat] = useState({
    income: true,
    bills: true
  });
  const [copySuccess, setCopySuccess] = useState(false);
  const [importStep, setImportStep] = useState(null);
  const [importRows, setImportRows] = useState([]);
  const [importTags, setImportTags] = useState({});
  const [importError, setImportError] = useState("");
  const [importMonth, setImportMonth] = useState(null);
  const [filterMonth, setFilterMonth] = useState(true);
  const [importMode, setImportMode] = useState("csv");
  const [loadingMsg, setLoadingMsg] = useState("");
  const csvRef = useRef();
  const pdfRef = useRef();
  const jsonImport = useRef();

  // ── Export: show JSON in a copyable modal ──
  const [showBackup, setShowBackup] = useState(false);
  const [showRestore, setShowRestore] = useState(false);
  const [restorePaste, setRestorePaste] = useState("");
  const backupText = showBackup ? JSON.stringify(allData, null, 2) : "";
  async function handleRestore() {
    try {
      const data = JSON.parse(restorePaste);
      const isValid = typeof data === "object" && !Array.isArray(data) && Object.values(data).every(v => v && typeof v === "object" && Array.isArray(v.income) && Array.isArray(v.bills));
      if (!isValid) {
        alert("That doesn't look like a Finance Tracker backup.");
        return;
      }
      for (const [k, v] of Object.entries(data)) await storeMonth(k, v);
      setAllData(data);
      setShowRestore(false);
      setRestorePaste("");
      alert("Restored " + Object.keys(data).length + " months of data!");
    } catch {
      alert("Could not parse that — make sure you copied the full backup text.");
    }
  }
  function copyBackup() {
    navigator.clipboard.writeText(backupText).then(() => alert("Copied to clipboard!")).catch(() => {
      const ta = document.getElementById("backup-ta");
      if (ta) {
        ta.select();
        document.execCommand("copy");
        alert("Copied!");
      }
    });
  }

  // ── Import a JSON backup to restore all data ──
  async function handleJSONImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const isValid = typeof data === "object" && !Array.isArray(data) && Object.values(data).every(v => v && typeof v === "object" && Array.isArray(v.income) && Array.isArray(v.bills));
        if (!isValid) {
          alert("That doesn't look like a Finance Tracker backup file.");
          return;
        }
        for (const [k, v] of Object.entries(data)) await storeMonth(k, v);
        setAllData(data);
        alert("Restored " + Object.keys(data).length + " months of data!");
      } catch {
        alert("Could not read that file.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  // ── Boot: load profile names + all months for current profile ──
  useEffect(() => {
    (async () => {
      const names = await loadProfileNames();
      setProfileNames(names);
      const keys = await listMonthKeys(getProfilePrefix(0));
      const loaded = {};
      for (const k of keys) {
        const d = await loadMonth(k);
        if (d) loaded[k] = d;
      }
      setAllData(loaded);
      const svgs = await loadSavings(0, today.getFullYear());
      setYearSavings(svgs);
      setReady(true);
    })();
  }, []);

  // ── Switch profile: load that profile's data ──
  async function switchProfile(idx) {
    setProfile(idx);
    const keys = await listMonthKeys(getProfilePrefix(idx));
    const loaded = {};
    for (const k of keys) {
      const d = await loadMonth(k);
      if (d) loaded[k] = d;
    }
    setAllData(loaded);
    const svgs = await loadSavings(idx, year);
    setYearSavings(svgs);
    setActiveTab("overview");
  }

  // ── Reload savings when year changes ──
  useEffect(() => {
    if (!ready) return;
    (async () => {
      const svgs = await loadSavings(profile, year);
      setYearSavings(svgs);
    })();
  }, [year, profile, ready]);

  // ── Rename profile ──
  async function saveProfileName() {
    if (editingName === null) return;
    const updated = [...profileNames];
    updated[editingName] = nameInput.trim() || profileNames[editingName];
    setProfileNames(updated);
    await storeProfileNames(updated);
    setEditingName(null);
    setNameInput("");
  }

  // ── Save code: compact base64 of all data ────────────────────────────────
  const [showSaveCode, setShowSaveCode] = useState(false);
  const [showLoadCode, setShowLoadCode] = useState(false);
  const [loadCodeText, setLoadCodeText] = useState("");
  const [loadCodeErr, setLoadCodeErr] = useState("");
  const [copied, setCopied] = useState(false);
  function getSaveCode() {
    try {
      return btoa(unescape(encodeURIComponent(JSON.stringify({
        profile,
        allData
      }))));
    } catch {
      return "";
    }
  }
  function copySaveCode() {
    const code = getSaveCode();
    if (!code) return;
    navigator.clipboard.writeText(code).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  }
  async function applyLoadCode() {
    try {
      const json = decodeURIComponent(escape(atob(loadCodeText.trim())));
      const parsed = JSON.parse(json);
      const savedProfile = parsed.profile ?? 0;
      const data = parsed.allData ?? parsed;
      const ok = typeof data === "object" && !Array.isArray(data) && Object.values(data).every(v => v && Array.isArray(v.income) && Array.isArray(v.bills));
      if (!ok) {
        setLoadCodeErr("That doesn't look right — copy the full save code.");
        return;
      }
      for (const [k, v] of Object.entries(data)) await storeMonth(k, v);
      setAllData(data);
      // Restore yearly savings if present in the code
      if (Array.isArray(parsed.yearSavings)) {
        const svYear = parsed.savingsYear ?? year;
        setYearSavings(parsed.yearSavings);
        await storeSavings(savedProfile, svYear, parsed.yearSavings);
      }
      if (savedProfile !== profile) await switchProfile(savedProfile);
      setShowLoadCode(false);
      setLoadCodeText("");
      setLoadCodeErr("");
    } catch {
      setLoadCodeErr("Couldn't read that code. Make sure you copied it completely.");
    }
  }
  const key = getKey(profile, year, month);
  const monthData = allData[key] || {
    income: [],
    bills: []
  };
  const totalIncome = monthData.income.reduce((s, i) => s + (parseFloat(i.amount) || 0), 0);
  const totalBills = monthData.bills.reduce((s, b) => s + (parseFloat(b.amount) || 0), 0);
  const totalPaid = monthData.bills.filter(b => b.paid).reduce((s, b) => s + (parseFloat(b.amount) || 0), 0);
  const totalUnpaid = totalBills - totalPaid;
  const remaining = totalIncome - totalBills;
  const paidPct = totalBills > 0 ? Math.round(totalPaid / totalBills * 100) : 0;
  const totalSaved = yearSavings.reduce((s, sv) => s + (parseFloat(sv.current) || 0), 0);
  const totalTarget = yearSavings.reduce((s, sv) => s + (parseFloat(sv.target) || 0), 0);
  async function updateMonthData(newData) {
    const updated = {
      ...allData,
      [key]: newData
    };
    setAllData(updated);
    await storeMonth(key, newData);
  }

  // Income
  async function saveIncome() {
    if (!incomeForm.label || !incomeForm.amount) return;
    const items = [...(monthData.income || [])];
    if (editIncomeIdx !== null) items[editIncomeIdx] = {
      ...incomeForm
    };else items.push({
      ...incomeForm
    });
    await updateMonthData({
      ...monthData,
      income: items
    });
    setShowIncomeModal(false);
    setIncomeForm({
      label: "",
      amount: ""
    });
    setEditIncomeIdx(null);
  }
  async function deleteIncome(idx) {
    await updateMonthData({
      ...monthData,
      income: monthData.income.filter((_, i) => i !== idx)
    });
  }

  // Bills
  async function saveBill() {
    if (!billForm.label || !billForm.amount) return;
    const items = [...(monthData.bills || [])];
    if (editBillIdx !== null) items[editBillIdx] = {
      ...billForm
    };else items.push({
      ...billForm
    });
    await updateMonthData({
      ...monthData,
      bills: items
    });
    setShowBillModal(false);
    setBillForm({
      label: "",
      amount: "",
      due: "",
      paid: false
    });
    setEditBillIdx(null);
  }
  async function deleteBill(idx) {
    await updateMonthData({
      ...monthData,
      bills: monthData.bills.filter((_, i) => i !== idx)
    });
  }
  async function togglePaid(idx) {
    await updateMonthData({
      ...monthData,
      bills: monthData.bills.map((b, i) => i === idx ? {
        ...b,
        paid: !b.paid
      } : b)
    });
  }

  // Savings — year-wide, not per month
  async function saveSavings() {
    if (!savingsForm.label) return;
    const items = [...yearSavings];
    if (editSavingsIdx !== null) items[editSavingsIdx] = {
      ...savingsForm
    };else items.push({
      ...savingsForm
    });
    setYearSavings(items);
    await storeSavings(profile, year, items);
    setShowSavingsModal(false);
    setSavingsForm({
      label: "",
      target: "",
      current: "",
      notes: ""
    });
    setEditSavingsIdx(null);
  }
  async function deleteSavings(idx) {
    const items = yearSavings.filter((_, i) => i !== idx);
    setYearSavings(items);
    await storeSavings(profile, year, items);
  }
  async function updateSavingsCurrent(idx, val) {
    const items = yearSavings.map((sv, i) => i === idx ? {
      ...sv,
      current: val
    } : sv);
    setYearSavings(items);
    await storeSavings(profile, year, items);
  }

  // Copy
  function getCopyOptions() {
    return Array.from({
      length: 23
    }, (_, i) => i - 11).filter(d => d !== 0).map(delta => {
      let m = month + delta,
        y = year;
      while (m < 0) {
        m += 12;
        y--;
      }
      while (m > 11) {
        m -= 12;
        y++;
      }
      const k = getKey(profile, y, m);
      return {
        key: k,
        label: `${MONTHS[m]} ${y}`,
        hasData: !!(allData[k]?.income?.length || allData[k]?.bills?.length)
      };
    });
  }
  async function executeCopy() {
    if (!copyTargets.length) return;
    let updated = {
      ...allData
    };
    for (const tk of copyTargets) {
      const ex = updated[tk] || {
        income: [],
        bills: []
      };
      const nd = {
        income: copyWhat.income ? monthData.income.map(i => ({
          ...i
        })) : ex.income,
        bills: copyWhat.bills ? monthData.bills.map(b => ({
          ...b,
          paid: false
        })) : ex.bills
      };
      updated[tk] = nd;
      await storeMonth(tk, nd);
    }
    setAllData(updated);
    setCopySuccess(true);
    setTimeout(() => {
      setCopySuccess(false);
      setShowCopyModal(false);
      setCopyTargets([]);
    }, 1400);
  }

  // CSV
  function handleCSVFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setImportError("");
    setImportMode("csv");
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const rows = parseCSV(ev.target.result);
        if (!rows.length) {
          setImportError("No transactions found.");
          return;
        }
        setImportRows(rows);
        setImportTags(autoTag(rows));
        setImportMonth(detectMonth(rows));
        setImportStep("review");
      } catch {
        setImportError("Could not parse this file.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  // PDF — user shares PDF in chat, I load it. Button kept for future.
  function handlePDFFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setImportError("Share your Wells Fargo PDF directly in this chat and I'll add it for you instantly — that's the most reliable method.");
    e.target.value = "";
  }
  function getFilteredRows() {
    const idx = importRows.map((r, i) => ({
      ...r,
      idx: i
    }));
    if (!filterMonth || !importMonth) return idx;
    return idx.filter(r => r.date && r.date.getMonth() === importMonth.month && r.date.getFullYear() === importMonth.year);
  }
  async function commitImport() {
    const filtered = getFilteredRows();
    const tMonth = importMonth?.month ?? month,
      tYear = importMonth?.year ?? year;
    const tKey = getKey(profile, tYear, tMonth);
    const existing = allData[tKey] || {
      income: [],
      bills: []
    };
    const newIncome = [...existing.income],
      newBills = [...existing.bills];
    filtered.forEach(r => {
      const tag = importTags[r.idx];
      if (tag === "income") newIncome.push({
        label: r.desc,
        amount: String(Math.abs(r.amount))
      });else if (tag === "bill") newBills.push({
        label: r.desc,
        amount: String(Math.abs(r.amount)),
        due: "",
        paid: true
      });
    });
    const nd = {
      income: newIncome,
      bills: newBills
    };
    const updated = {
      ...allData,
      [tKey]: nd
    };
    setAllData(updated);
    await storeMonth(tKey, nd);
    setMonth(tMonth);
    setYear(tYear);
    setImportStep("done");
    setTimeout(() => {
      setImportStep(null);
      setImportRows([]);
      setImportTags({});
    }, 2000);
  }
  const filteredRows = importStep === "review" ? getFilteredRows() : [];
  const incomeRows = filteredRows.filter(r => importTags[r.idx] === "income");
  const billRows = filteredRows.filter(r => importTags[r.idx] === "bill");
  const ignoredRows = filteredRows.filter(r => importTags[r.idx] === "ignore");

  // ── Styles ────────────────────────────────────────────────────────────────
  const css = `
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#1a1a20;}::-webkit-scrollbar-thumb{background:#3a3a45;border-radius:3px;}
    .tab-btn{background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:10px 20px;border-radius:4px;transition:all .2s;}
    .tab-btn.active{background:#c9a84c;color:#0d0d10;}.tab-btn:not(.active){color:#888;}.tab-btn:not(.active):hover{color:#f0ede6;}
    .card{background:#16161c;border:1px solid #2a2a33;border-radius:12px;padding:24px;}
    .icon-btn{background:none;border:none;cursor:pointer;color:#666;transition:color .2s;padding:4px 6px;border-radius:4px;font-size:16px;}
    .icon-btn:hover{color:#c9a84c;}.icon-btn.danger:hover{color:#e05252;}
    .add-btn{display:flex;align-items:center;gap:8px;background:none;border:1px dashed #3a3a45;border-radius:8px;color:#666;cursor:pointer;padding:12px 16px;width:100%;font-family:'DM Mono',monospace;font-size:13px;transition:all .2s;margin-top:10px;}
    .add-btn:hover{border-color:#c9a84c;color:#c9a84c;}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
    .modal{background:#1a1a22;border:1px solid #2a2a38;border-radius:16px;padding:28px;width:100%;max-width:420px;}
